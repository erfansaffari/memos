<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #fff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected    { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .dot.checking     { background: #d1d5db; }
    .label    { font-size: 13px; font-weight: 500; color: #111; }
    .sublabel { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .count       { font-size: 28px; font-weight: 600; color: #111; margin-top: 4px; }
    .count-label {
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .offline-msg {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
      line-height: 1.6;
    }
    code {
      background: #f3f4f6;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
      font-family: "SFMono-Regular", Consolas, monospace;
    }
  </style>
</head>
<body>
  <div class="status">
    <div class="dot checking" id="dot"></div>
    <div>
      <div class="label" id="status-label">Checking…</div>
      <div class="sublabel">MemOS local server</div>
    </div>
  </div>

  <div id="connected-view" style="display:none">
    <div class="count" id="memory-count">0</div>
    <div class="count-label">memories stored</div>
  </div>

  <div id="offline-view" style="display:none">
    <div class="offline-msg">
      Server offline. Start it with:<br>
      <code>python main.py server</code>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
